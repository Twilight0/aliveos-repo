name: Build AliveOS Pacman Repository

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays
  workflow_dispatch:

jobs:
  build-repo:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install Base Build Tools
        run: |
          pacman -Sy --noconfirm git base-devel sudo binutils libarchive grep intltool glib2-devel

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Builder User
        run: |
          # Create non-root user for makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder
          
          # Initialize pacman keyring
          pacman-key --init
          pacman-key --populate archlinux

      - name: Configure Pacman with Chaotic-AUR
        run: |
          # Import Chaotic-AUR keys & repository to resolve AUR dependencies quickly
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst' 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'
          
          cat <<EOF >> /etc/pacman.conf

          [multilib]
          Include = /etc/pacman.d/mirrorlist

          [chaotic-aur]
          Include = /etc/pacman.d/chaotic-mirrorlist
          EOF
          pacman -Sy

      - name: Set permissions for builder
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          # Configure Git settings for the builder user to handle slow AUR connections gracefully
          sudo -u builder git config --global http.postBuffer 524288000
          sudo -u builder git config --global http.lowSpeedLimit 0
          sudo -u builder git config --global http.lowSpeedTime 999999

      - name: Import CachyOS GPG key
        run: |
          # Import into pacman keyring (for pacman -U later)
          pacman-key --recv-key E8B9AA39F054E30E8290D492C3C4820857F654FE --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key E8B9AA39F054E30E8290D492C3C4820857F654FE
          # Import into builder user's GPG keyring (for makepkg source verification)
          sudo -u builder gpg --keyserver keyserver.ubuntu.com --recv-keys E8B9AA39F054E30E8290D492C3C4820857F654FE

      - name: Build Packages & Generate Repository Database
        run: |
          sudo -u builder bash scripts/build-packages.sh

      - name: Deploy to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install gh CLI
          pacman -S --noconfirm github-cli 2>/dev/null || {
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture 2>/dev/null || echo amd64) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
            apt-get update -qq && apt-get install -y -qq gh 2>/dev/null
          }

          # Prepare repo database files (copy, not symlink)
          cp x86_64/aliveos-repo.db.tar.gz aliveos-repo.db
          cp x86_64/aliveos-repo.files.tar.gz aliveos-repo.files

          # Delete existing "latest" release if it exists
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # Create new release
          gh release create latest \
            --title "Latest Build" \
            --notes "Automated build from $(git rev-parse --short HEAD)" \
            --target main

          # Upload database files
          gh release upload latest aliveos-repo.db aliveos-repo.files --clobber

          # Upload all packages
          gh release upload latest x86_64/*.pkg.tar.zst --clobber
